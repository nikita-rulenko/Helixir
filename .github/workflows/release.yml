name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: helixir-linux-x86_64
            # Lean core since v0.8.0: ort's build script downloads ONNX
            # Runtime prebuilts from cdn.pyke.io at build time — a third-party
            # CDN outage (2026-07-03) broke the release pipeline. All five
            # artifacts are lean now; NLI stays a compile-time opt-in (#80).
            flags: --no-default-features

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: helixir-linux-arm64
            cross: true
            # Lean core: ort (NLI) prebuilts are unreliable for this target and
            # the cross container has no target OpenSSL — vendored-tls compiles
            # OpenSSL from source so the artifact is self-contained.
            flags: --no-default-features --features vendored-tls

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: helixir-macos-x86_64
            # Lean core: ort ships no prebuilt ONNX Runtime for Intel macOS
            # (same posture as CI's macos job). NLI stays a compile-time opt-in.
            flags: --no-default-features

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: helixir-macos-arm64
            # Lean core: ort's download-binaries step links flakily on the
            # macOS arm64 runner (clang_rt.osx path varies by image) — the
            # same reason CI's macos job builds --no-default-features.
            flags: --no-default-features

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: helixir-windows-x86_64
            ext: .exe
            # Lean core since v0.8.0 — same cdn.pyke.io outage as the
            # linux-x86_64 entry above (#80).
            flags: --no-default-features

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: helixir
          key: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build (native)
        if: ${{ !matrix.cross }}
        working-directory: helixir
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.flags || '' }}

      - name: Build (cross)
        if: matrix.cross
        working-directory: helixir
        run: cross build --release --target ${{ matrix.target }} ${{ matrix.flags || '' }}

      - name: Package artifacts
        shell: bash
        working-directory: helixir
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/helixir${{ matrix.ext || '' }} dist/
          cp target/${{ matrix.target }}/release/helixir-mcp${{ matrix.ext || '' }} dist/
          cp target/${{ matrix.target }}/release/helixir-deploy${{ matrix.ext || '' }} dist/
          cp -r schema dist/
          cd dist
          tar -czvf ../${{ matrix.artifact }}.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: helixir/${{ matrix.artifact }}.tar.gz

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    # Only run if Docker Hub credentials are configured. Otherwise the Login
    # step would fail every release. Set DOCKERHUB_USERNAME + DOCKERHUB_TOKEN
    # in repo secrets to enable.
    if: ${{ vars.PUBLISH_DOCKER == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./helixir
          push: true
          tags: |
            helixir/helixir:latest
            helixir/helixir:${{ github.ref_name }}
          platforms: linux/amd64,linux/arm64

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    # Tag pushes only: workflow_dispatch runs are build validation, and
    # action-gh-release must never fire from a bare branch ref.
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
