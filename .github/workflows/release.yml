name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: helixir-linux-x86_64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: helixir-linux-arm64
            cross: true

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: helixir-macos-x86_64

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: helixir-macos-arm64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: helixir-windows-x86_64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: helixir
          key: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build (native)
        if: ${{ !matrix.cross }}
        working-directory: helixir
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        working-directory: helixir
        run: cross build --release --target ${{ matrix.target }}

      - name: Package artifacts
        shell: bash
        working-directory: helixir
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/helixir-mcp${{ matrix.ext || '' }} dist/
          cp target/${{ matrix.target }}/release/helixir-deploy${{ matrix.ext || '' }} dist/
          cp -r schema dist/
          cd dist
          tar -czvf ../${{ matrix.artifact }}.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: helixir/${{ matrix.artifact }}.tar.gz

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    # Only run if Docker Hub credentials are configured. Otherwise the Login
    # step would fail every release. Set DOCKERHUB_USERNAME + DOCKERHUB_TOKEN
    # in repo secrets to enable.
    if: ${{ vars.PUBLISH_DOCKER == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./helixir
          push: true
          tags: |
            helixir/helixir:latest
            helixir/helixir:${{ github.ref_name }}
          platforms: linux/amd64,linux/arm64

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
