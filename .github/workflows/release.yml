name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: helixir-linux-x86_64
            # Full features again (#80): NLI links against Microsoft's
            # official ONNX Runtime release (fetched below, sha-pinned) via
            # ORT_LIB_LOCATION — cdn.pyke.io is out of the critical path and
            # blackholed during the build to prove it. The tarball ships
            # libonnxruntime.so.* next to the binaries (rpath $ORIGIN).
            flags: ''
            ort_url: https://github.com/microsoft/onnxruntime/releases/download/v1.24.2/onnxruntime-linux-x64-1.24.2.tgz
            ort_sha: 43725474ba5663642e17684717946693850e2005efbd724ac72da278fead25e6
            ort_dir: onnxruntime-linux-x64-1.24.2
            rustflags: -C link-arg=-Wl,-rpath,$ORIGIN

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: helixir-linux-arm64
            cross: true
            # Lean core: ort (NLI) prebuilts are unreliable for this target and
            # the cross container has no target OpenSSL — vendored-tls compiles
            # OpenSSL from source so the artifact is self-contained.
            flags: --no-default-features --features vendored-tls

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: helixir-macos-x86_64
            # Lean core: ort ships no prebuilt ONNX Runtime for Intel macOS
            # (same posture as CI's macos job). NLI stays a compile-time opt-in.
            flags: --no-default-features

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: helixir-macos-arm64
            # Lean core: ort's download-binaries step links flakily on the
            # macOS arm64 runner (clang_rt.osx path varies by image) — the
            # same reason CI's macos job builds --no-default-features.
            flags: --no-default-features

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: helixir-windows-x86_64
            ext: .exe
            # Full features again (#80): same MS-release linking as the
            # linux-x86_64 entry; onnxruntime.dll ships next to the exe.
            flags: ''
            ort_url: https://github.com/microsoft/onnxruntime/releases/download/v1.24.2/onnxruntime-win-x64-1.24.2.zip
            ort_sha: 8e3e9c826375352e29cb2614fe44f3d7a4b0ff7b8028ad7a456af9d949a7e8b0
            ort_dir: onnxruntime-win-x64-1.24.2

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: helixir
          key: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Fetch ONNX Runtime (NLI link target, #80)
        if: matrix.ort_url
        shell: bash
        run: |
          curl -fsSL --retry 5 --retry-delay 5 -o ort-archive "${{ matrix.ort_url }}"
          echo "${{ matrix.ort_sha }}  ort-archive" | sha256sum -c -
          case "${{ matrix.ort_url }}" in
            *.tgz) tar xzf ort-archive ;;
            *.zip) python -m zipfile -e ort-archive . ;;
          esac
          # MSVC's link.exe cannot use git-bash POSIX paths — hand it a
          # Windows-style one (pwd -W). Linux keeps plain $PWD.
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "ORT_LIB_LOCATION=$(pwd -W)/${{ matrix.ort_dir }}/lib" >> "$GITHUB_ENV"
          else
            echo "ORT_LIB_LOCATION=$PWD/${{ matrix.ort_dir }}/lib" >> "$GITHUB_ENV"
          fi
          echo "ORT_PREFER_DYNAMIC_LINK=1" >> "$GITHUB_ENV"

      # The whole point of #80: the build must succeed with the third-party
      # CDN unreachable. Blackhole it so a regression fails loudly here, not
      # during the next outage.
      - name: Blackhole cdn.pyke.io (Linux)
        if: matrix.ort_url && runner.os == 'Linux'
        run: echo "127.0.0.1 cdn.pyke.io" | sudo tee -a /etc/hosts
      - name: Blackhole cdn.pyke.io (Windows)
        if: matrix.ort_url && runner.os == 'Windows'
        shell: pwsh
        run: Add-Content -Path C:\Windows\System32\drivers\etc\hosts -Value "127.0.0.1 cdn.pyke.io"

      - name: Build (native)
        if: ${{ !matrix.cross }}
        working-directory: helixir
        env:
          RUSTFLAGS: ${{ matrix.rustflags || '' }}
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.flags || '' }}

      - name: Build (cross)
        if: matrix.cross
        working-directory: helixir
        run: cross build --release --target ${{ matrix.target }} ${{ matrix.flags || '' }}

      - name: Package artifacts
        shell: bash
        working-directory: helixir
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/helixir${{ matrix.ext || '' }} dist/
          cp target/${{ matrix.target }}/release/helixir-mcp${{ matrix.ext || '' }} dist/
          cp target/${{ matrix.target }}/release/helixir-deploy${{ matrix.ext || '' }} dist/
          cp -r schema dist/
          # #80: full-feature artifacts carry the ONNX Runtime next to the
          # binaries (linux links with rpath $ORIGIN; windows finds the DLL
          # in the exe directory). Keep them together when relocating.
          if [ -n "${ORT_LIB_LOCATION:-}" ]; then
            cp -a "$ORT_LIB_LOCATION"/libonnxruntime*.so* dist/ 2>/dev/null || true
            cp "$ORT_LIB_LOCATION"/onnxruntime.dll dist/ 2>/dev/null || true
          fi
          cd dist
          tar -czvf ../${{ matrix.artifact }}.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: helixir/${{ matrix.artifact }}.tar.gz

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    # Only run if Docker Hub credentials are configured. Otherwise the Login
    # step would fail every release. Set DOCKERHUB_USERNAME + DOCKERHUB_TOKEN
    # in repo secrets to enable.
    if: ${{ vars.PUBLISH_DOCKER == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./helixir
          push: true
          tags: |
            helixir/helixir:latest
            helixir/helixir:${{ github.ref_name }}
          platforms: linux/amd64,linux/arm64

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    # Tag pushes only: workflow_dispatch runs are build validation, and
    # action-gh-release must never fire from a bare branch ref.
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
