name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Reduce link/codegen pressure on CI runners.
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        working-directory: helixir
        run: cargo fmt --all -- --check

  docs-lint:
    name: docs freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # #85: catches the drift classes that shipped on 2026-07-04 — stale
      # TOC anchors/order, wrong "N tools" claims, a release without a
      # migration note. Milliseconds, no dependencies.
      - name: docs lint
        run: python3 .github/scripts/docs_lint.py

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: helixir
          key: clippy
      # #9: the too_many_arguments backlog is at zero — new offenders break
      # the build. Full `-D warnings` stays off until the remaining lint
      # backlog is burned down.
      - name: cargo clippy
        working-directory: helixir
        env:
          RUSTFLAGS: ""
        run: cargo clippy --all-targets --no-deps -- -D clippy::too-many-arguments

  test:
    name: unit tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu builds the FULL surface (NLI/ort included) — keeps NLI under
          # test on the platform where ort links cleanly.
          - os: ubuntu-latest
            features: ""
          # macOS builds the lean core WITHOUT the `nli` feature: the `ort`
          # (ONNX Runtime) download-binaries step fails to LINK on the macOS
          # arm64 runner. NLI is opt-in (collective/insights tier), so the
          # default-build core must compile and test without it — that's what
          # macOS verifies here.
          - os: macos-latest
            features: "--no-default-features"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: helixir
          key: test-${{ matrix.os }}
      - name: cargo build
        working-directory: helixir
        run: cargo build --all-targets ${{ matrix.features }} --locked || cargo build --all-targets ${{ matrix.features }}
      - name: cargo test --lib
        working-directory: helixir
        run: cargo test --lib ${{ matrix.features }} --locked || cargo test --lib ${{ matrix.features }}

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # edition = 2024 needs Rust 1.85+. The core (without the opt-in `nli`
      # feature) holds that line; only `nli`/ort requires rustc 1.88, so MSRV is
      # checked WITHOUT default features.
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: helixir
          key: msrv
      - name: cargo check
        working-directory: helixir
        run: cargo check --all-targets --no-default-features
