# ============================================================================
# Helixir-RS Docker Compose
# 
# Full stack: HelixDB + Helixir MCP Server
# ============================================================================

version: '3.8'

services:
  # HelixDB - Graph database for memory storage
  helixdb:
    image: helixdb/helixdb:latest
    container_name: helixdb
    ports:
      - "6969:6969"
    volumes:
      - helixdb_data:/data
      - ./schema:/schema:ro
    environment:
      - HELIX_LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6969/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # OOM containment: a runaway query/index spike hits this cap and the
    # container restarts in seconds instead of taking the whole Docker VM
    # down with it (observed 2026-07-02: two kernel OOM kills). LMDB is
    # durable — a restart loses no data.
    mem_limit: 3g
    memswap_limit: 3g
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # Schema deployment (runs once)
  schema-deploy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: helixir-schema-deploy
    entrypoint: ["helixir-deploy"]
    command: ["--host", "helixdb", "--port", "6969"]
    depends_on:
      helixdb:
        condition: service_healthy
    restart: "no"

  # Helixir MCP Server
  # Note: MCP uses stdio, so this is for testing/development
  # In production, run helixir-mcp directly on the host
  helixir-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: helixir-mcp
    environment:
      - HELIX_HOST=helixdb
      - HELIX_PORT=6969
      - HELIX_LLM_PROVIDER=${HELIX_LLM_PROVIDER:-cerebras}
      - HELIX_LLM_MODEL=${HELIX_LLM_MODEL:-llama-3.3-70b}
      - HELIX_LLM_API_KEY=${HELIX_LLM_API_KEY}
      - HELIX_LLM_BASE_URL=${HELIX_LLM_BASE_URL:-}
      - HELIX_EMBEDDING_PROVIDER=${HELIX_EMBEDDING_PROVIDER:-openai}
      - HELIX_EMBEDDING_MODEL=${HELIX_EMBEDDING_MODEL:-sentence-transformers/all-mpnet-base-v2}
      - HELIX_EMBEDDING_URL=${HELIX_EMBEDDING_URL:-https://openrouter.ai/api/v1}
      - HELIX_EMBEDDING_API_KEY=${HELIX_EMBEDDING_API_KEY}
      - RUST_LOG=helixir=warn,helixir::mcp=info
    depends_on:
      helixdb:
        condition: service_healthy
      schema-deploy:
        condition: service_completed_successfully
    # stdin_open: true  # For MCP stdio
    # tty: true
    restart: unless-stopped

volumes:
  helixdb_data:
    driver: local

# ============================================================================
# Usage:
#
# 1. Create .env file with API keys:
#    HELIX_LLM_API_KEY=your_cerebras_key
#    HELIX_EMBEDDING_API_KEY=your_openrouter_key
#
# 2. Start services:
#    docker-compose up -d
#
# 3. For MCP in Cursor, run helixir-mcp directly on host:
#    HELIX_HOST=localhost cargo run --release --bin helixir-mcp
#
# ============================================================================

