# ============================================================================
# Helixir Docker Compose — HelixDB only.
#
# IMPORTANT — how the image gets here: there is NO public helixdb/helixdb
# image on Docker Hub. The HelixDB server image is built LOCALLY by the
# HelixDB CLI, which compiles this repo's schema/queries INTO the server:
#
#   cargo install helix-cli            # once
#   cd helixir/schema && helix check && helix build -i dev
#
# That produces the local image `helix-helixir-dev:latest` used below.
# Schema changes require a rebuild + container swap (no hot reload).
#
# The MCP server is NOT a compose service: MCP speaks stdio and is spawned
# by your MCP client (Claude Desktop / Cursor / zeroclaw) — point it at
# ~/.helixir/bin/helixir-mcp (`make install`). For a network-reachable
# endpoint use `helixir gateway` (streamable HTTP) on the host.
# ============================================================================

services:
  helixdb:
    image: helix-helixir-dev:latest
    container_name: helixdb
    ports:
      - "6969:6969"
    volumes:
      # ⚠️ Persistence: newer HelixDB defaults to IN-MEMORY storage — without
      # HELIX_DATA_DIR pointing at a mounted volume, stopping the container
      # ERASES everything. Keep both lines.
      - helixdb_data:/data
    environment:
      - HELIX_PORT=6969
      - HELIX_DATA_DIR=/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6969/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # OOM containment: a runaway query/index spike hits this cap and the
    # container restarts in seconds instead of taking the whole Docker VM
    # down with it (observed 2026-07-02: two kernel OOM kills). LMDB is
    # durable — a restart loses no data.
    mem_limit: 3g
    memswap_limit: 3g
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  helixdb_data:
