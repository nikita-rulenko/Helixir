# ============================================================================
# Helixir Docker Compose - Development Reference
#
# IMPORTANT: This file is for reference only. HelixDB requires schema
# compilation via the `helix` CLI - it cannot be deployed via HTTP.
#
# For the correct setup process, see README.md or use:
#   ../helix-db/target/release/helix push dev
# ============================================================================

# NOTE: The recommended approach is to use the helix CLI directly:
#
# 1. Build helix CLI:
#    cd ../helix-db && cargo build --release --bin helix
#
# 2. Initialize and deploy:
#    ../helix-db/target/release/helix init local -n dev
#    cp schema/*.hx db/
#    ../helix-db/target/release/helix push dev
#
# 3. Initialize ontology:
#    curl -X POST http://localhost:6969/initializeBaseOntology \
#      -H "Content-Type: application/json" -d '{}'
#
# 4. Run helixir-mcp on host (MCP uses stdio, not HTTP):
#    HELIX_HOST=localhost HELIX_PORT=6969 \
#    HELIX_LLM_API_KEY=xxx HELIX_EMBEDDING_API_KEY=xxx \
#    ./target/release/helixir-mcp

services:
  # This service is managed by `helix push dev` - do not start manually
  # The helix CLI builds a custom container with compiled queries
  helixdb-reference:
    image: helix-helixir-dev_app:latest
    container_name: helix-helixir-dev_app
    ports:
      - "6969:6969"
    profiles:
      - reference  # Won't start with regular docker-compose up

# ============================================================================
# To check if HelixDB is running after `helix push dev`:
#   docker ps | grep helix
#   curl -X POST http://localhost:6969/getAllConcepts -H "Content-Type: application/json" -d '{}'
# ============================================================================
